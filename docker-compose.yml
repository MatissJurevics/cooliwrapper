services:
  cooliwrapper:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://uigendeploy.deploymentsv1.dubsof.com}
      STATIC_SITE_STORAGE_ROOT: /app/uploads/static-sites
      STATIC_SITE_ARTIFACT_STORAGE_ROOT: /app/uploads/artifacts
      STATIC_SITE_DOMAIN_SUFFIX: ${STATIC_SITE_DOMAIN_SUFFIX:-deploymentsv1.dubsof.com}
      STATIC_SITE_DOMAIN_SCHEME: ${STATIC_SITE_DOMAIN_SCHEME:-https}
    expose:
      - "3000"
    volumes:
      - cooliwrapper_uploads:/app/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cooliwrapper_uploads:
